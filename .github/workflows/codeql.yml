name: CodeQL

on:
  push:
    branches: [main, master]
    paths-ignore:
      - 'skins-pro/**'
      - 'screenshots/**'
      - '.github/workflows/**'
      - 'README.md'
      - 'README.zh-CN.md'
  pull_request:
    branches: [main, master]
    paths-ignore:
      - 'skins-pro/**'
      - 'screenshots/**'
      - '.github/workflows/**'
      - 'README.md'
      - 'README.zh-CN.md'
  schedule:
    - cron: '0 0 * * 0'

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript

      - name: Analyze
        uses: github/codeql-action/analyze@v3
